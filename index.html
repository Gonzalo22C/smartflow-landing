<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fluya</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <div class="container navbar">

            <div class="logo">
                Fluya
            </div>

            <nav class="nav-menu">

                <a href="#">Inicio</a>
                <a href="#">Servicios</a>
                <a href="#">Contacto</a>

            </nav>

            <a href="#" class="btn-primary">
                Comenzar
            </a>

        </div>

    </header>

    <!-- HERO -->

    <section class="hero">

        <div class="container hero-content">

            <!-- LEFT -->

            <div class="hero-text">

                <span class="badge">
                    Automatización inteligente
                </span>

                <h1>
                    Haz que tu negocio <span>fluya</span> mejor.
                </h1>

                <p>
                    Automatiza procesos, organiza tu información y transforma la manera en que atiendes a tus clientes
                    con herramientas digitales modernas.
                </p>

                <div class="hero-buttons">

                    <a href="#" class="btn-primary">
                        Comenzar ahora
                    </a>

                    <a href="#" class="btn-secondary">
                        Ver cómo funciona
                    </a>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="hero-image">

                <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=1200&auto=format&fit=crop"
                    alt="Dashboard">

            </div>

        </div>

    </section>

</body>

</html>
